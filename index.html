<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Lucky JAE-YEON World</title>
    <style>
        :root { --point-green: #9de47c; --border-dark: #555; }
        body {
            margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center;
            font-family: 'Pretendard', sans-serif; overflow: hidden;
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
            position: relative;
        }
        .clover-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        .clover { position: absolute; color: #4cad3a; font-size: 20px; animation: fall linear infinite; opacity: 0; }
        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }
        .wrapper {
            z-index: 10; width: 85vw; max-width: 950px; height: 75vh;
            background-color: var(--point-green); border: 2px solid var(--border-dark);
            border-radius: 20px; padding: 15px; position: relative;
            box-shadow: 10px 10px 0px rgba(0,0,0,0.1); display: flex; justify-content: center; align-items: center;
        }
        .container {
            width: 100%; height: 100%; background-color: white;
            border: 2px dashed #fff; border-radius: 15px; display: flex; padding: 25px; box-sizing: border-box;
        }
        .left-panel { width: 230px; border-right: 1px solid #eee; padding-right: 20px; display: flex; flex-direction: column; }
        .profile-box { width: 100%; height: 200px; border: 1px solid #ddd; border-radius: 8px; overflow: hidden; background: #f8f8f8; }
        .profile-img { width: 100%; height: 100%; object-fit: cover; }
        .main-panel { flex: 1; padding-left: 25px; display: flex; flex-direction: column; position: relative; }
        .main-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #d4edda; padding-bottom: 12px; margin-bottom: 25px; }
        
        /* 🎵 뮤직 버튼 디자인 보강 */
        .bgm-btn {
            background: #fff; border: 1px solid #4cad3a; color: #4cad3a;
            padding: 6px 18px; border-radius: 20px; font-size: 11px; font-weight: bold; cursor: pointer;
            box-shadow: 2px 2px 0px rgba(0,0,0,0.05); transition: 0.2s;
        }
        .bgm-btn:active { transform: translate(1px, 1px); box-shadow: none; }
        .bgm-btn.playing { background: #4cad3a; color: #fff; }

        .content-box { flex: 1; background: #fff; border: 1px solid #f0f0f0; border-radius: 15px; padding: 30px; }
        .menu-tabs { position: absolute; right: -67px; top: 60px; display: flex; flex-direction: column; gap: 4px; }
        .tab { 
            width: 65px; height: 35px; background: white; border: 2px solid var(--border-dark); 
            border-left: none; border-radius: 0 8px 8px 0; font-size: 11px; font-weight: bold;
            display: flex; align-items: center; justify-content: center; cursor: pointer; color: #555;
        }
        .tab.active { background: var(--point-green); color: white; }
        #player { position: absolute; width: 0; height: 0; visibility: hidden; }
    </style>
</head>
<body>
    <div class="clover-container" id="clover-box"></div>
    <div id="player"></div>

    <div class="wrapper">
        <div class="container">
            <aside class="left-panel">
                <div style="font-size: 11px; text-align: center; margin-bottom: 15px;">TODAY <span style="color:red">7</span> | TOTAL 777</div>
                <div class="profile-box">
                    <img src="https://images.unsplash.com/photo-1528183429752-a97d0bf99b5a?q=80&w=2070" class="profile-img">
                </div>
                <div style="font-size: 12px; margin-top: 20px; padding: 15px; background: #f4fff4; border-radius: 10px; color: #555;">
                    <b>Lucky JAE-YEON</b><br>
                    재생 오류 수정 완료!<br>
                    이제 버튼만 누르세요 🍀
                </div>
            </aside>

            <main class="main-panel">
                <div class="main-header">
                    <span style="font-size: 18px; font-weight: 800; color: #4cad3a;">Lucky JAE-YEON World</span>
                    <button id="music-btn" class="bgm-btn" onclick="toggleMusic()">▶ MUSIC START</button>
                </div>
                <div class="content-box">
                    <h3 style="margin-top:0;">Today's BGM 🎵</h3>
                    <p style="color: #666; font-size: 14px;">
                        "완벽한 딱 맞는 상상을 믿는거야"<br><br>
                        노란 창이 뜨는 문제를 해결했어요! <br>
                        주소로 접속한 뒤, 잠시(1~2초)만 기다렸다가 <br>
                        상단의 <b>▶ MUSIC START</b>를 눌러보세요.
                    </p>
                </div>
                <nav class="menu-tabs">
                    <div class="tab active">홈</div>
                    <div class="tab">사진첩</div>
                    <div class="tab">방명록</div>
                </nav>
            </main>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let player;
        let isPlaying = false;
        let isApiReady = false;

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '0', width: '0', videoId: 'UCmgGZbfjmk',
                playerVars: { 'autoplay': 0, 'controls': 0, 'mute': 1, 'enablejsapi': 1 },
                events: { 'onReady': () => { isApiReady = true; console.log("API Ready!"); } }
            });
        }

        function toggleMusic() {
            if (!isApiReady) return; // API 로딩 전 클릭 방지
            const btn = document.getElementById('music-btn');
            
            if (!isPlaying) {
                player.unMute(); // 음소거 먼저 풀고
                player.playVideo(); // 재생
                btn.innerText = "♪ NOW PLAYING";
                btn.classList.add('playing');
                isPlaying = true;
            } else {
                player.pauseVideo();
                btn.innerText = "▶ MUSIC START";
                btn.classList.remove('playing');
                isPlaying = false;
            }
        }

        const cloverBox = document.getElementById('clover-box');
        function createClover() {
            const clover = document.createElement('div');
            clover.className = 'clover'; clover.innerText = '🍀';
            clover.style.left = Math.random() * 100 + 'vw';
            clover.style.animationDuration = Math.random() * 3 + 5 + 's';
            cloverBox.appendChild(clover);
            setTimeout(() => { clover.remove(); }, 8000);
        }
        setInterval(createClover, 500);
    </script>
</body>
</html>
